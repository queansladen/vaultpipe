# vaultpipe example configuration
vault_address: "https://vault.example.com"
vault_token: "s.XXXXXXXXXXXX"

# audit_log controls structured JSON audit output.
# Set enabled: true and provide a file path, or omit path to write to stderr.
audit_log:
  enabled: true
  path: "/var/log/vaultpipe/audit.log"

# secrets maps environment variable names to Vault paths and keys.
secrets:
  - env: DB_PASSWORD
    path: secret/data/myapp
    key: db_password
  - env: API_KEY
    path: secret/data/myapp
    key: api_key
  - env: SMTP_PASS
    path: secret/data/smtp
    key: password

# command is the process to execute with the injected environment.
command:
  - "/usr/bin/myapp"
  - "--config"
  - "/etc/myapp/config.toml"
