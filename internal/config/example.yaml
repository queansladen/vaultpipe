# vaultpipe example configuration
vault_address: "https://vault.example.com"
vault_token: "s.exampletoken"

# Secrets to inject as environment variables
secrets:
  - env: DB_PASSWORD
    path: secret/data/myapp/db
    key: password
  - env: API_KEY
    path: secret/data/myapp/api
    key: key
  - env: SMTP_PASS
    path: secret/data/myapp/smtp
    key: password

# audit logging
audit:
  enabled: true
  output: stderr   # stderr or a file path

# Command to execute with injected secrets
command:
  - ./myapp
  - --config
  - /etc/myapp/config.toml
