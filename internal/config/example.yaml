# vaultpipe example configuration

# Address of the Vault server.
vault_address: "http://127.0.0.1:8200"

# Token used to authenticate with Vault.
# Can also be set via the VAULT_TOKEN environment variable.
vault_token: "root"

# List of Vault secret paths to fetch before launching the command.
secrets:
  - path: secret/db
  - path: secret/api

# Environment variables injected into the child process.
# Values support Go template expressions using the secret function:
#   {{ secret "<path>" "<key>" }}
env:
  DB_PASSWORD: '{{ secret "secret/db" "password" }}'
  DB_USER: '{{ secret "secret/db" "user" }}'
  API_KEY: '{{ secret "secret/api" "key" }}'
  APP_ENV: production

# Command and arguments to execute with the resolved environment.
command:
  - ./myapp
  - serve
